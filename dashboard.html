<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Frota Pro</title>
  <script src="api.js"></script>
  <style>
    :root {
      --bg: #0b1220; --card: #142034; --text: #e6edf7;
      --accent: #22c55e; --warn: #f59e0b; --border: #1d2940;
    }
    body { 
      background: var(--bg); color: var(--text); 
      font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px;
    }
    .container { max-width: 800px; margin: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
    .stat-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
    .stat-val { block-size: 40px; font-size: 32px; font-weight: bold; color: var(--accent); }
    
    .table-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    .table-header { padding: 15px; background: rgba(255,255,255,0.05); font-weight: bold; border-bottom: 1px solid var(--border); }
    .row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .row:last-child { border: none; }
    .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    .status-em-uso { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .status-concluido { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .btn-back { color: var(--text); text-decoration: none; font-size: 14px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="index.html" class="btn-back">← Voltar</a>
      <h2>Painel de Controle</h2>
      <div id="sync-status" style="font-size: 10px; color: var(--accent);">ATUALIZADO</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="total-frota">-</div>
        <div style="font-size: 12px; opacity: 0.6;">Veículos na Frota</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="em-uso-count">-</div>
        <div style="font-size: 12px; opacity: 0.6;">Em Trânsito</div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">Últimas Movimentações</div>
      <div id="lista-atividades">
        <div style="padding: 20px; text-align: center; opacity: 0.5;">Carregando dados...</div>
      </div>
    </div>
  </div>

  <script>
    async function carregarDashboard() {
      try {
        const res = await Api.home();
        if(!res.ok) return;

        // Atualiza números
        document.getElementById('total-frota').innerText = res.home.totalVeiculos || 0;
        
        // Filtra quantos estão em uso no momento
        const emUso = res.home.recentes.filter(r => r.status === "EM USO").length;
        document.getElementById('em-uso-count').innerText = emUso;

        // Renderiza lista
        const lista = document.getElementById('lista-atividades');
        if(res.home.recentes.length === 0) {
          lista.innerHTML = '<div style="padding:20px; text-align:center;">Nenhum registro encontrado.</div>';
          return;
        }

        lista.innerHTML = res.home.recentes.map(item => `
          <div class="row">
            <div>
              <strong>${item.veiculo}</strong><br>
              <span style="opacity: 0.6; font-size: 12px;">${item.motorista}</span>
            </div>
            <div style="text-align: right;">
              <span class="status-badge ${item.status === 'EM USO' ? 'status-em-uso' : 'status-concluido'}">
                ${item.status}
              </span>
            </div>
          </div>
        `).join('');

      } catch (err) {
        console.error(err);
        document.getElementById('lista-atividades').innerHTML = '<div style="padding:20px; color:red;">Erro ao conectar com a planilha.</div>';
      }
    }

    // Carrega ao abrir e atualiza a cada 30 segundos
    carregarDashboard();
    setInterval(carregarDashboard, 30000);
  </script>
</body>
</html>
